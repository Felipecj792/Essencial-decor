<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento aprovado — Essencial Decor</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #fafafa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .box { text-align: center; padding: 60px 40px; max-width: 480px; }
  .icone { font-size: 4rem; margin-bottom: 24px; }
  h1 { font-weight: 400; font-size: 1.6rem; margin-bottom: 12px; letter-spacing: 1px; }
  p { color: #777; font-size: 0.95rem; line-height: 1.7; margin-bottom: 32px; }
  a { display: inline-block; padding: 14px 32px; background: #111; color: #fff; text-decoration: none; border-radius: 50px; font-size: 14px; font-weight: 500; transition: background .3s; }
  a:hover { background: #444; }
</style>
</head>
<body>
  <div class="box">
    <div class="icone">✅</div>
    <h1>Pagamento aprovado!</h1>
    <p>Seu pedido foi confirmado. Em breve você receberá as informações de envio por e-mail.</p>
    <a href="/">Voltar à loja</a>
  </div>
</body>
</html>
